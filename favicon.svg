<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#080808"/>
  <!-- Clock circle -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#e63232" stroke-width="3"/>
  <!-- Tick marks -->
  <line x1="32" y1="8" x2="32" y2="13" stroke="#e63232" stroke-width="2.5"/>
  <line x1="56" y1="32" x2="51" y2="32" stroke="#444" stroke-width="1.5"/>
  <line x1="8" y1="32" x2="13" y2="32" stroke="#444" stroke-width="1.5"/>
  <line x1="32" y1="56" x2="32" y2="51" stroke="#444" stroke-width="1.5"/>
  <!-- Hour hand -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#ede9e0" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="32" y1="32" x2="44" y2="32" stroke="#e63232" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#e63232"/>
</svg>
