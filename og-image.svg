<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e63232" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1200" height="3" fill="#e63232"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Eyebrow text -->
  <text x="600" y="155" font-family="monospace" font-size="18" fill="#e63232" text-anchor="middle" letter-spacing="8">PRESIDENTIAL TERM COUNTDOWN</text>

  <!-- Main headline -->
  <text x="600" y="290" font-family="Arial Black, sans-serif" font-size="112" fill="#ede9e0" text-anchor="middle" font-weight="900" letter-spacing="2">TIME LEFT</text>
  <text x="600" y="410" font-family="Arial Black, sans-serif" font-size="112" fill="#ede9e0" text-anchor="middle" font-weight="900" letter-spacing="2">FOR <tspan fill="#e63232">TRUMP</tspan></text>

  <!-- Subline -->
  <text x="600" y="490" font-family="monospace" font-size="20" fill="#555" text-anchor="middle" letter-spacing="4">January 20, 2029 · 12:00:00 EST</text>

  <!-- URL -->
  <text x="600" y="570" font-family="monospace" font-size="22" fill="#333" text-anchor="middle" letter-spacing="3">PRESIDENCYCLOCK.COM</text>

  <!-- Clock icon left -->
  <circle cx="120" cy="315" r="60" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <circle cx="120" cy="315" r="55" fill="none" stroke="#e63232" stroke-width="2"/>
  <line x1="120" y1="315" x2="120" y2="272" stroke="#ede9e0" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="315" x2="150" y2="315" stroke="#e63232" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="315" r="5" fill="#e63232"/>

  <!-- Clock icon right -->
  <circle cx="1080" cy="315" r="60" fill="none" stroke="#1e1e1e" stroke-width="2"/>
  <circle cx="1080" cy="315" r="55" fill="none" stroke="#e63232" stroke-width="2"/>
  <line x1="1080" y1="315" x2="1080" y2="272" stroke="#ede9e0" stroke-width="4" stroke-linecap="round"/>
  <line x1="1080" y1="315" x2="1110" y2="315" stroke="#e63232" stroke-width="3" stroke-linecap="round"/>
  <circle cx="1080" cy="315" r="5" fill="#e63232"/>
</svg>
